<!DOCTYPE html>
<html>
<head>
  <title>Evolution Quiz</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .box {
      margin-top: 80px;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
    }

    .question {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .btn:hover {
      background: #475569;
    }

    #nextBtn {
      margin-top: 15px;
      background: #22c55e;
      font-weight: bold;
    }

    #score {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="question" id="question">Loading...</div>

  <button class="btn" onclick="selectAnswer('A')" id="A"></button>
  <button class="btn" onclick="selectAnswer('B')" id="B"></button>
  <button class="btn" onclick="selectAnswer('C')" id="C"></button>
  <button class="btn" onclick="selectAnswer('D')" id="D"></button>

  <button id="nextBtn" onclick="nextQuestion()">NEXT ➜</button>

  <div id="score"></div>
</div>

<script>
let current = 0;
let score = 0;
let selected = null;

let quiz = [
  {
    q: "What is evolution?",
    A: "Change in species over time",
    B: "Animals staying the same",
    C: "Only humans evolving",
    D: "Random weather changes",
    correct: "A"
  },
  {
    q: "Who is Charles Darwin?",
    A: "Invented electricity",
    B: "Developed Natural Selection",
    C: "Made vaccines",
    D: "Discovered DNA structure",
    correct: "B"
  },
  {
    q: "Natural selection means:",
    A: "Weak survive",
    B: "All survive equally",
    C: "Best traits survive and reproduce",
    D: "No change happens",
    correct: "C"
  },
  {
    q: "Fossils provide evidence of:",
    A: "Weather patterns",
    B: "Evolution over time",
    C: "Food chains only",
    D: "Gravity changes",
    correct: "B"
  }
];

function loadQuestion() {
  let q = quiz[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("A").innerText = "A: " + q.A;
  document.getElementById("B").innerText = "B: " + q.B;
  document.getElementById("C").innerText = "C: " + q.C;
  document.getElementById("D").innerText = "D: " + q.D;

  selected = null;
}

function selectAnswer(option) {
  selected = option;
}

function nextQuestion() {
  if (selected === quiz[current].correct) {
    score++;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.querySelector(".box").innerHTML =
      "<h2>Quiz Finished!</h2><p>Your score: " + score + "/" + quiz.length + "</p>";
  }
}

loadQuestion();
</script>

</body>
</html>
