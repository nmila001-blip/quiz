<!DOCTYPE html>
<html>
<head>
  <title>Advanced U.S. History Quiz</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .box {
      margin-top: 60px;
      width: 75%;
      margin-left: auto;
      margin-right: auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
    }

    .question {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #334155;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #475569;
    }

    .selected {
      background: #facc15 !important;
      color: black;
    }

    .correct {
      background: #22c55e !important;
      color: black;
    }

    .wrong {
      background: #ef4444 !important;
      color: white;
    }

    #nextBtn {
      margin-top: 15px;
      background: #22c55e;
      font-weight: bold;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #score {
      margin-top: 15px;
      font-size: 18px;
    }

    #progress {
      margin-bottom: 15px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<div class="box">

  <div id="progress"></div>

  <div class="question" id="question">Loading...</div>

  <button class="btn" onclick="select('A')" id="A"></button>
  <button class="btn" onclick="select('B')" id="B"></button>
  <button class="btn" onclick="select('C')" id="C"></button>
  <button class="btn" onclick="select('D')" id="D"></button>

  <button id="nextBtn" onclick="nextQ()">NEXT ➜</button>

  <div id="score"></div>

</div>

<script>

let i = 0;
let score = 0;
let picked = null;
let answered = false;

let quiz = [

{q:"What is a primary source?", A:"A source from the time period", B:"A modern textbook", C:"A movie", D:"A website", c:"A"},

{q:"What was the main reason for European exploration?", A:"Finding trade routes and wealth", B:"Watching movies", C:"Avoiding oceans", D:"Building factories", c:"A"},

{q:"What crop helped Jamestown survive?", A:"Rice", B:"Corn", C:"Tobacco", D:"Cotton", c:"C"},

{q:"What was the Northwest Passage?", A:"A water route to Asia", B:"A battle", C:"A tax law", D:"A colony", c:"A"},

{q:"What was mercantilism?", A:"Economic system benefiting the mother country", B:"A religion", C:"A war", D:"A treaty", c:"A"},

{q:"What was the Great Awakening?", A:"Religious revival movement", B:"War", C:"Tax protest", D:"Trade route", c:"A"},

{q:"Who wrote the Declaration of Independence?", A:"George Washington", B:"Thomas Jefferson", C:"John Adams", D:"Benjamin Franklin", c:"B"},

{q:"What battle was the turning point of the American Revolution?", A:"Yorktown", B:"Saratoga", C:"Bunker Hill", D:"Lexington", c:"B"},

{q:"What weakness did the Articles of Confederation have?", A:"Weak national government", B:"Strong army", C:"Too many presidents", D:"Too much money", c:"A"},

{q:"What event showed the weaknesses of the Articles?", A:"Boston Tea Party", B:"Shay's Rebellion", C:"Civil War", D:"Louisiana Purchase", c:"B"},

{q:"What did the Great Compromise settle?", A:"Representation in Congress", B:"Slavery", C:"Taxes", D:"Religion", c:"A"},

{q:"What principle divides power among branches?", A:"Federalism", B:"Popular sovereignty", C:"Checks and balances", D:"Separation of powers", c:"D"},

{q:"Who created the cabinet system?", A:"Washington", B:"Jefferson", C:"Adams", D:"Hamilton", c:"A"},

{q:"Hamilton wanted a ______ federal government.", A:"Weak", B:"Small", C:"Strong", D:"Limited", c:"C"},

{q:"What invention helped cotton production?", A:"Steam engine", B:"Telegraph", C:"Cotton gin", D:"Light bulb", c:"C"},

{q:"What was Manifest Destiny?", A:"Belief in westward expansion", B:"A tax", C:"A war", D:"A religion", c:"A"},

{q:"What was the Trail of Tears?", A:"A trade route", B:"Forced Native American relocation", C:"A railroad", D:"A battle", c:"B"},

{q:"What ended the Mexican-American War?", A:"Treaty of Guadalupe Hidalgo", B:"Constitution", C:"Missouri Compromise", D:"Monroe Doctrine", c:"A"},

{q:"Why was the Missouri Compromise important?", A:"Balanced free and slave states", B:"Ended slavery", C:"Started war", D:"Created parties", c:"A"},

{q:"What was the spoils system?", A:"Rewarding supporters with jobs", B:"Tax system", C:"Trade system", D:"Military plan", c:"A"},

{q:"What did the Stamp Act tax?", A:"Printed materials", B:"Tea", C:"Glass", D:"Sugar", c:"A"},

{q:"What was the Boston Tea Party?", A:"Colonists dumping tea", B:"A battle", C:"A treaty", D:"A speech", c:"A"},

{q:"What does consent of the governed mean?", A:"Government power comes from the people", B:"Kings rule forever", C:"Military control", D:"Religious power", c:"A"},

{q:"What are unalienable rights?", A:"Rights that cannot be taken away", B:"Temporary laws", C:"Taxes", D:"Privileges", c:"A"},

{q:"Who commanded the Continental Army?", A:"Washington", B:"Jefferson", C:"Hamilton", D:"Franklin", c:"A"},

{q:"What document limited the king’s power?", A:"Magna Carta", B:"Constitution", C:"Bill of Rights", D:"Mayflower Compact", c:"A"},

{q:"What was the Enlightenment?", A:"Movement promoting reason", B:"Trade route", C:"War", D:"Religion", c:"A"},

{q:"Who won the French and Indian War?", A:"Britain", B:"France", C:"Spain", D:"Colonists", c:"A"},

{q:"What angered colonists about the Proclamation of 1763?", A:"Could not move west", B:"Lost elections", C:"No trade", D:"Lost farms", c:"A"},

{q:"What did the Navigation Acts do?", A:"Restricted colonial trade", B:"Freed colonies", C:"Ended taxes", D:"Started wars", c:"A"},

{q:"What colonial region focused on shipbuilding and fishing?", A:"New England", B:"Southern", C:"Middle", D:"Western", c:"A"},

{q:"What was subsistence farming?", A:"Growing enough food to survive", B:"Factory farming", C:"Cash crop farming", D:"Mining", c:"A"},

{q:"What was the House of Burgesses?", A:"Representative assembly", B:"War council", C:"Tax office", D:"Church", c:"A"},

{q:"What did the Albany Plan of Union encourage?", A:"Colonial unity", B:"War with Spain", C:"Slavery", D:"Trade", c:"A"},

{q:"What was the Middle Passage?", A:"Slave trade route", B:"Colonial road", C:"Battle", D:"River", c:"A"},

{q:"What did the Declaration of Independence do?", A:"Declared independence from Britain", B:"Ended slavery", C:"Created taxes", D:"Started Constitution", c:"A"},

{q:"What was Shay’s Rebellion?", A:"Farmers protesting debt", B:"British attack", C:"Slave revolt", D:"Tax law", c:"A"},

{q:"What compromise counted enslaved people as 3/5?", A:"Three-Fifths Compromise", B:"Missouri Compromise", C:"Great Compromise", D:"Compromise of 1850", c:"A"},

{q:"What principle means power belongs to the people?", A:"Popular sovereignty", B:"Federalism", C:"Checks and balances", D:"Judicial review", c:"A"},

{q:"What are checks and balances?", A:"Each branch limits the others", B:"Tax collection", C:"Voting system", D:"Military structure", c:"A"},

{q:"What political party did Jefferson support?", A:"Democratic-Republicans", B:"Federalists", C:"Whigs", D:"Republicans", c:"A"},

{q:"What did the Alien and Sedition Acts limit?", A:"Speech and immigrants", B:"Trade", C:"Voting", D:"Religion", c:"A"},

{q:"What was the Industrial Revolution?", A:"Shift to machines and factories", B:"A war", C:"A migration", D:"A religion", c:"A"},

{q:"Who invented the cotton gin?", A:"Eli Whitney", B:"Thomas Edison", C:"Alexander Bell", D:"Henry Ford", c:"A"},

{q:"What did interchangeable parts improve?", A:"Manufacturing", B:"Farming", C:"Religion", D:"Voting", c:"A"},

{q:"What issue caused sectionalism?", A:"Slavery", B:"Music", C:"Sports", D:"Television", c:"A"},

{q:"What did Jackson’s spoils system do?", A:"Gave jobs to supporters", B:"Ended voting", C:"Raised taxes", D:"Built railroads", c:"A"},

{q:"What was the Nullification Crisis about?", A:"States’ rights vs federal power", B:"War with Mexico", C:"Voting rights", D:"Banking", c:"A"},

{q:"Why did Jackson oppose the national bank?", A:"Thought it favored the wealthy", B:"Wanted more banks", C:"Loved tariffs", D:"Wanted war", c:"A"},

{q:"What was the Panic of 1837?", A:"Economic depression", B:"War", C:"Election", D:"Religious movement", c:"A"},

{q:"Who were Tejanos?", A:"Mexican Texans", B:"French settlers", C:"Native Americans", D:"British soldiers", c:"A"},

{q:"Who was president during the Mexican-American War?", A:"James K. Polk", B:"Lincoln", C:"Adams", D:"Jefferson", c:"A"},

{q:"What did the Treaty of Guadalupe Hidalgo do?", A:"Gave western land to U.S.", B:"Ended Revolution", C:"Ended Civil War", D:"Started slavery", c:"A"},

{q:"Why did Mormons move west?", A:"Religious persecution", B:"Gold", C:"War", D:"Trade", c:"A"},

{q:"What caused the California Gold Rush?", A:"Gold discovered in 1848", B:"War", C:"Factories", D:"Railroads", c:"A"}

];

quiz.sort(() => Math.random() - 0.5);

function load() {

  let q = quiz[i];

  document.getElementById("progress").innerText =
    "Question " + (i + 1) + " / " + quiz.length;

  document.getElementById("question").innerText = q.q;

  document.getElementById("A").innerText = "A: " + q.A;
  document.getElementById("B").innerText = "B: " + q.B;
  document.getElementById("C").innerText = "C: " + q.C;
  document.getElementById("D").innerText = "D: " + q.D;

  resetButtons();

  picked = null;
  answered = false;

  document.getElementById("score").innerText =
    "Score: " + score;
}

function select(opt) {

  if (answered) return;

  picked = opt;

  resetButtons();

  document.getElementById(opt).classList.add("selected");
}

function nextQ() {

  if (!picked) return;

  let correct = quiz[i].c;

  if (picked === correct) {

    score++;

    document.getElementById(picked).classList.add("correct");

  } else {

    document.getElementById(picked).classList.add("wrong");

    document.getElementById(correct).classList.add("correct");
  }

  answered = true;

  setTimeout(() => {

    i++;

    if (i < quiz.length) {

      load();

    } else {

      let percent = Math.round((score / quiz.length) * 100);

      document.querySelector(".box").innerHTML =
        "<h1>Quiz Finished!</h1>" +
        "<h2>Score: " + score + "/" + quiz.length + "</h2>" +
        "<h2>" + percent + "%</h2>";
    }

  }, 800);
}

function resetButtons() {

  ["A","B","C","D"].forEach(id => {

    let b = document.getElementById(id);

    b.classList.remove("selected","correct","wrong");

  });
}

load();

</script>

</body>
</html>
